<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Recap — Better Season Golf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Share card style: dark green palette, same as share-card-mock.html */
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #0f1412;
      color: #e8edea;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .recap-card {
      width: 360px;
      min-height: 640px;
      background: #0f1412;
      border-radius: 16px;
      padding: 1.75rem 1.5rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      border: 1px solid #2d3834;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .recap-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('../logos/tall golf painting.png') center bottom / cover no-repeat;
      opacity: 0.18;
      z-index: 0;
      border-radius: inherit;
      pointer-events: none;
    }
    .recap-content {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .recap-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .recap-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .recap-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e8edea;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .recap-date {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e8edea;
      margin-bottom: 0.25rem;
    }
    .recap-mode {
      font-size: 1rem;
      color: #8a9a92;
      margin-bottom: 1.25rem;
    }
    .recap-stats {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1.25rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: #2d9d64;
    }
    .recap-answer-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #8a9a92;
      margin-bottom: 0.75rem;
    }
    .recap-players {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      flex: 1;
    }
    .recap-player {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #1a211d;
      border: 1px solid #2d3834;
      border-radius: 12px;
      padding: 0.6rem 0.75rem;
    }
    .recap-player-headshot {
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 50%;
      overflow: hidden;
      background: #232d28;
      flex-shrink: 0;
    }
    .recap-player-headshot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .recap-player-info {
      flex: 1;
      min-width: 0;
    }
    .recap-player-name {
      font-size: 1rem;
      font-weight: 700;
      color: #e8edea;
      margin-bottom: 0.25rem;
    }
    .recap-player-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .recap-card-stat {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      font-size: 0.8rem;
      padding: 0.2rem 0.4rem;
      border-radius: 6px;
      font-weight: 600;
      color: #fff;
    }
    .recap-brand {
      font-size: 0.95rem;
      color: #8a9a92;
      margin-top: auto;
      padding-top: 1rem;
    }
  </style>
</head>
<body>
  <script>window.__RECAP_DATA__ = __RECAP_DATA_PLACEHOLDER__;</script>
  <div class="recap-card" id="recap-card">
    <div class="recap-content">
      <div class="recap-header">
        <img class="recap-logo" id="recap-logo" src="../logos/BS 500x500.png" alt="">
        <span class="recap-title">Daily Recap</span>
      </div>
      <div class="recap-date" id="recap-date">March 13 Recap</div>
      <div class="recap-mode" id="recap-mode">Best Ball</div>
      <div class="recap-stats" id="recap-stats"></div>
      <div class="recap-answer-title">Yesterday's Answer</div>
      <div class="recap-players" id="recap-players"></div>
      <div class="recap-brand" id="recap-brand">betterseason.live/golf</div>
    </div>
  </div>
  <script>
    (function() {
      const data = window.__RECAP_DATA__;
      if (!data) return;
      const formatScore = (n) => {
        n = parseInt(n, 10);
        if (isNaN(n)) return '—';
        if (n === 0) return 'E';
        return n > 0 ? '+' + n : String(n);
      };
      const formatEvent = (name) => {
        if (!name) return '';
        let s = name.trim().replace(/^\d{4}\s+/, '').replace(/^World\s+Golf\s+Championships-\s*/i, '');
        if (s === 'The Open') return 'The Open';
        if (s.startsWith('the ')) s = 'The ' + s.slice(4);
        else if (s.length > 0) s = s.charAt(0).toUpperCase() + s.slice(1);
        return s.length > 14 ? s.slice(0, 12) + '…' : s;
      };
      const scoreBg = (s) => {
        if (s <= -1) return 'hsl(152, 42%, 46%)';
        if (s <= 5) return 'hsl(48, 52%, 44%)';
        return 'hsl(0, 54%, 42%)';
      };
      document.getElementById('recap-date').textContent = data.dateLabel || 'Recap';
      document.getElementById('recap-mode').textContent = data.modeLabel || 'Best Ball';
      const statsEl = document.getElementById('recap-stats');
      statsEl.innerHTML = '';
      if (data.totalPlayers != null && data.totalPlayers > 0) {
        const span1 = document.createElement('span');
        span1.textContent = data.totalPlayers + ' player' + (data.totalPlayers !== 1 ? 's' : '');
        statsEl.appendChild(span1);
      }
      if (data.averageScore != null && !isNaN(data.averageScore)) {
        const span2 = document.createElement('span');
        span2.textContent = 'Avg ' + formatScore(Math.round(data.averageScore * 10) / 10);
        statsEl.appendChild(span2);
      }
      const fallbackSvg = 'data:image/svg+xml,' + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="%234a5568"><ellipse cx="50" cy="38" rx="22" ry="26"/><path d="M15 120c0-22 15-40 35-40s35 18 35 40z"/></svg>'
      );
      const playersEl = document.getElementById('recap-players');
      playersEl.innerHTML = '';
      (data.puzzle || []).forEach(function(p) {
        const div = document.createElement('div');
        div.className = 'recap-player';
        const headshotDiv = document.createElement('div');
        headshotDiv.className = 'recap-player-headshot';
        if (p.headshotUrl) {
          const img = document.createElement('img');
          img.src = p.headshotUrl;
          img.alt = '';
          img.onerror = function() { this.src = fallbackSvg; };
          headshotDiv.appendChild(img);
        } else {
          const img = document.createElement('img');
          img.src = fallbackSvg;
          img.alt = '';
          headshotDiv.appendChild(img);
        }
        const infoDiv = document.createElement('div');
        infoDiv.className = 'recap-player-info';
        const nameDiv = document.createElement('div');
        nameDiv.className = 'recap-player-name';
        nameDiv.textContent = p.player_name || '—';
        const cardsDiv = document.createElement('div');
        cardsDiv.className = 'recap-player-cards';
        (p.cards || []).forEach(function(c) {
          const stat = document.createElement('span');
          stat.className = 'recap-card-stat';
          stat.style.background = scoreBg(c.score_to_par);
          const ev = formatEvent(c.event_name);
          stat.textContent = (ev || '') + ' ' + (c.year || '') + ': ' + formatScore(c.score_to_par);
          cardsDiv.appendChild(stat);
        });
        infoDiv.appendChild(nameDiv);
        infoDiv.appendChild(cardsDiv);
        div.appendChild(headshotDiv);
        div.appendChild(infoDiv);
        playersEl.appendChild(div);
      });
    })();
  </script>
</body>
</html>
